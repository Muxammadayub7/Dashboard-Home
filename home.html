<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Home</title>
  <link rel="stylesheet" href="./css/home.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>

  <div class="dashboard-wrapper">
    <aside class="sidebar">
      <div class="logo">
        <a href="./home.html" class="logo">
          Admin
        </a>
      </div>
      <nav class="menu">
        <a href="home.html" class="active">📊 Dashboard</a>
        <a href="./clientlar.html">👥 Clients</a>
        <a href="./moliya.html">💰 Moliya</a>
      </nav>
    </aside>

    <main class="main-content">
      <header>
        <h1>Moliya Tahlili</h1>
      </header>

      <div class="cards">
        <div class="card green">
          <h3>DOXOD (Tushum)</h3>
          <span class="value" id="income">12,628,349</span>
          <p>Jami tushgan naqd pul</p>
        </div>

        <div class="card red">
          <h3>RASXOD (Xarajat)</h3>
          <span class="value" id="expense">5,400,000</span>
          <p>Operatsion xarajatlar</p>
        </div>

        <div class="card purple">
          <h3>BALANS</h3>
          <span class="value" id="balance">7,228,349</span>
          <p>Kassadagi sof qoldiq</p>
        </div>
      </div>

      <div class="chart-container">
        <h3>Oylik tahlil (Diagramma)</h3>
        <div class="dummy-chart">
          <div class="bar" style="height: 60%;"></div>
          <div class="bar" style="height: 80%;"></div>
          <div class="bar" style="height: 40%;"></div>
          <div class="bar" style="height: 90%;"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="./js/home.js"></script>

</body>

</html>
