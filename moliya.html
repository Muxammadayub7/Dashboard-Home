<!DOCTYPE html>
<html lang="uz">

<head>
  <script>
    if (sessionStorage.getItem('isLoggedIn') !== 'true') {
      window.stop()
      window.location.replace('./login.html')
    }
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moliya | Buxgalteriya</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/moliya.css">
  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: #1e1e2d;
      margin: 5% auto;
      padding: 25px;
      border-radius: 15px;
      width: 400px;
      color: white;
      position: relative;
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #333;
      background: #2b2b40;
      color: white;
      display: block;
    }

    .close {
      position: absolute;
      right: 20px;
      top: 15px;
      cursor: pointer;
      font-size: 24px;
      color: #aaa;
    }

    .save-btn {
      width: 100%;
      padding: 15px;
      background: #20c997;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    #phone,
    #tarif,
    .label-tarif {
      display: block;
    }

    /* Default holatda ko'rinadi */
  </style>
</head>

<body>
  <div class="dashboard-wrapper">
    <aside class="sidebar">
      <div class="logo"><a class="logo" href="./home.html">Admin</a></div>
      <nav class="menu">
        <a href="home.html">📊 Dashboard</a>
        <a href="./clientlar.html">👥 Clients</a>
        <a href="./moliya.html" class="active">💰 Moliya</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1>Moliyaviy Amaliyotlar</h1>
        <button class="add-btn" onclick="openModal()">+ Kirim/Chiqim qo'shish</button>
      </header> 

      <div id="financeModal" class="modal">
        <div class="modal-content">
          <span class="close" onclick="closeModal()">&times;</span>
          <h2>Yangi amaliyot</h2>
          <label>Amaliyot turi:</label>
          <select id="type" onchange="togglePhoneInput()">
            <option value="kirim">Kirim (O'quvchi to'lovi)</option>
            <option value="chiqim">Chiqim (Xarajatlar)</option>
          </select>
          <input type="text" id="ism" placeholder="Ism Familiya yoki Izoh">
          <input type="text" id="phone" placeholder="Telefon raqami (00 000 00 00)">
          <input type="number" id="amount" placeholder="Summa (UZS)">
          <label class="label-tarif">Tarif:</label>
          <select id="tarif">
            <option value="GOLD">GOLD</option>
            <option value="SILVER">SILVER</option>
            <option value="VIP">VIP</option>
          </select>
          <button class="save-btn" onclick="addClient()">Saqlash</button>
        </div>
      </div>

      <div class="table-responsive">
        <h3>Oxirgi pul harakatlari</h3>
        <table>
          <thead>
            <tr>
              <th>Sana</th>
              <th>Telefon Raqami</th>
              <th>Izoh</th>
              <th>Summa</th>
              <th>Status</th>
              <th>Amal</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="6" style="text-align:center;">Yuklanmoqda... ⏳</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="./js/moliya.js"></script>
</body>

</html>
