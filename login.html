<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Admin Panel</title>
  <link rel="stylesheet" href="./css/moliya.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top left, rgba(78, 204, 163, 0.16), transparent 24%),
        radial-gradient(circle at bottom right, rgba(94, 114, 228, 0.18), transparent 26%),
        linear-gradient(135deg, #120a25, #1b153b 55%, #10192f);
      padding: 16px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    .login-container::before,
    .login-container::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.5;
    }

    .login-container::before {
      width: 240px;
      height: 240px;
      background: rgba(78, 204, 163, 0.18);
      top: 7%;
      left: 8%;
    }

    .login-container::after {
      width: 280px;
      height: 280px;
      background: rgba(87, 117, 255, 0.16);
      right: 4%;
      bottom: 8%;
    }

    .login-card {
      position: relative;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(24, 30, 61, 0.94), rgba(19, 16, 44, 0.96));
      padding: 42px 34px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 70px rgba(3, 5, 18, 0.45);
      text-align: left;
      width: 100%;
      max-width: 390px;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      backdrop-filter: blur(18px);
      animation: loginRise 0.7s ease;
    }

    .login-badge {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #d8fff1;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .login-card h2 {
      color: white;
      margin: 0;
      font-size: 34px;
      line-height: 1.05;
    }

    .login-subtitle {
      margin: 12px 0 24px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 15px;
      line-height: 1.5;
    }

    .login-card label {
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      font-weight: 600;
      margin: 6px 0 8px;
      align-self: flex-start;
    }

    .login-card input {
      padding: 14px 16px;
      margin: 0 0 8px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(10, 14, 32, 0.6);
      color: white;
      outline: none;
      width: 100%;
      box-sizing: border-box;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    }

    .login-card input:focus {
      border-color: rgba(78, 204, 163, 0.65);
      box-shadow: 0 0 0 4px rgba(78, 204, 163, 0.12);
      transform: translateY(-1px);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #58dfb2, #3dbd95 55%, #2f9f7d);
      border: none;
      border-radius: 14px;
      color: #072119;
      font-weight: 800;
      cursor: pointer;
      margin-top: 16px;
      box-shadow: 0 16px 28px rgba(61, 189, 149, 0.22);
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 34px rgba(61, 189, 149, 0.3);
      filter: brightness(1.03);
    }

    #error {
      color: #ff8ca1;
      margin-top: 12px;
      display: none;
      align-self: flex-start;
      font-size: 13px;
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid rgba(233, 69, 96, 0.18);
      padding: 10px 12px;
      border-radius: 12px;
      width: 100%;
      box-sizing: border-box;
    }

    .page-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 10, 23, 0.78);
      backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.22s ease, visibility 0.22s ease;
    }

    .page-loader.show {
      opacity: 1;
      visibility: visible;
    }

    .loader-card {
      min-width: 220px;
      padding: 24px 22px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(24, 30, 61, 0.96), rgba(19, 16, 44, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 26px 60px rgba(3, 5, 18, 0.45);
      text-align: center;
      color: white;
    }

    .loader-spinner {
      width: 48px;
      height: 48px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.12);
      border-top-color: #58dfb2;
      animation: spin 0.75s linear infinite;
    }

    .loader-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .loader-text {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.68);
      font-size: 14px;
    }

    @keyframes loginRise {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 640px) {
      .login-card {
        padding: 28px 18px;
        border-radius: 22px;
      }

      .login-card h2 {
        font-size: 28px;
      }
    }

    @media (max-width: 360px) {
      .login-container {
        padding: 10px;
      }

      .login-card {
        padding: 22px 12px;
      }

      .login-card h2 {
        font-size: 24px;
      }

      .login-card input,
      .login-btn {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="page-loader" id="pageLoader" aria-hidden="true">
    <div class="loader-card">
      <div class="loader-spinner"></div>
      <p class="loader-title">Yuklanmoqda...</p>
      <p class="loader-text">Dashboard ochilyapti</p>
    </div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-badge">Admin Login</div>
      <h2>Xush kelibsiz!</h2>
      <p class="login-subtitle">Dashboardga kirish uchun login va parolni kiriting.</p>
      <label for="username">Login</label>
      <input type="text" id="username" placeholder="Login">
      <label for="password">Parol</label>
      <input type="password" id="password" placeholder="Parol">
      <button class="login-btn" id="loginBtn" onclick="checkLogin()">Kirish</button>
      <p id="error">Xato login yoki parol!</p>
    </div>
  </div>

  <script src="./js/login.js"></script>
</body>

</html>
