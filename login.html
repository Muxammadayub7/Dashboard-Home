<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <title>Login | Admin Panel</title>
  <link rel="stylesheet" href="./css/moliya.css">
  <style>
    .login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
    }

    .login-card {
      background: #16213e;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      width: 350px;
      text-align: center;
      width: 350px;
      display: flex;
      align-items: center;
      flex-direction: column;
    }

    .login-card input {
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      background: #1a1a2e;
      color: white;
      outline: none;
      width: 350px;
    }

    .login-btn {
      width: 374px;
      padding: 12px;
      background: #4ecca3;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-btn:hover {
      background: #45b391;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-card">
      <h2 style="color: white; margin-bottom: 20px;">Xush kelibsiz!</h2>
      <input type="text" id="username" placeholder="Login">
      <input type="password" id="password" placeholder="Parol">
      <button class="login-btn" onclick="checkLogin()">Kirish</button>
      <p id="error" style="color: #e94560; margin-top: 10px; display: none;">Xato login yoki parol!</p>
    </div>
  </div>

  <script src="./js/login.js"></script>
</body>

</html>
